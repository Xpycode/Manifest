name: Manifest
options:
  bundleIdPrefix: com.lucesumbrarum
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    DEVELOPMENT_TEAM: FDMSRXXN73
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES
    GENERATE_INFOPLIST_FILE: YES
    SWIFT_TREAT_WARNINGS_AS_ERRORS: NO

targets:
  Manifest:
    type: application
    platform: macOS
    sources:
      - path: Manifest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lucesumbrarum.Manifest
        PRODUCT_NAME: Manifest
        CODE_SIGN_ENTITLEMENTS: Manifest/Manifest.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0.1"
        CURRENT_PROJECT_VERSION: "101"
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.utilities
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 Gregor Müller. All rights reserved."
        INFOPLIST_KEY_CFBundleDisplayName: Manifest
        INFOPLIST_KEY_LSUIElement: NO

  ManifestTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ManifestTests
    dependencies:
      - target: Manifest
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lucesumbrarum.ManifestTests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Manifest.app/Contents/MacOS/Manifest"

schemes:
  Manifest:
    build:
      targets:
        Manifest: all
        ManifestTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ManifestTests
    archive:
      config: Release
