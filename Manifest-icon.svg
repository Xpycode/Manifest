<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#0A0E2A"></stop>
      <stop offset="55%" stop-color="#060A1C"></stop>
      <stop offset="100%" stop-color="#03050E"></stop>
    </radialGradient>
    <linearGradient id="spec" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.10"></stop>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0"></stop>
    </linearGradient>
    <radialGradient id="vign" cx="50%" cy="45%" r="75%">
      <stop offset="60%" stop-color="#000000" stop-opacity="0"></stop>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.55"></stop>
    </radialGradient>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FAFBFE"></stop>
      <stop offset="100%" stop-color="#D5DBE8"></stop>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"></feGaussianBlur>
      <feOffset dx="0" dy="6" result="off"></feOffset>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"></feFuncA></feComponentTransfer>
      <feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>

  
  <rect width="1024" height="1024" fill="url(#bg)"></rect>
  <rect width="1024" height="1024" fill="url(#spec)"></rect>
  <rect width="1024" height="1024" fill="url(#vign)"></rect>

  
  <g style="mix-blend-mode:screen">
    <circle cx="512" cy="540" r="230" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="7"></circle>
    <circle cx="512" cy="540" r="320" fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="5.5"></circle>
    <circle cx="512" cy="540" r="410" fill="none" stroke="#ffffff" stroke-opacity="0.13" stroke-width="4"></circle>
  </g>

  
  <g filter="url(#shadow)">
    <rect x="360" y="677" width="304" height="39" rx="54" fill="#787E92"></rect>
    <rect x="360" y="677" width="304" height="18" rx="54" fill="#5A5F73"></rect>
    <rect x="362" y="399" width="300" height="282" rx="54" fill="url(#face)"></rect>
    <rect x="377" y="414" width="270" height="36" rx="18" fill="rgba(255,255,255,0.55)"></rect>
    <rect x="364" y="401" width="296" height="278" rx="52" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2"></rect>
  </g>

  
  <g filter="url(#shadow)" transform="translate(560 470) scale(0.62)">
    <path d="M0 0 L0 320 L78 252 L130 372 L188 348 L138 228 L236 228 Z" fill="#15171F" stroke="#ffffff" stroke-width="10" stroke-linejoin="round"></path>
  </g>
</svg>